<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
/>

<title>Particle Demo</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;

        background: #111;
        color: #555555;

        font-family: sans-serif;
    }

    body {
        display: flex;
        flex-direction: column;

        justify-content: center;
        align-items: center;

        overflow: hidden;
    }

    #header {
        margin-top: 12px;

        font-size: 48px;
        letter-spacing: 0.05em;

        color: #fff;
    }

    #canvas-container {
        width: 800px;
        height: 800px;

        display: flex;
        justify-content: center;
        align-items: center;

        background: #1a1a1a;

        border-radius: 12px;

        box-shadow:
            0 0 30px rgba(0,0,0,0.5),
            inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    canvas {
        width: 800px;
        height: 800px;

        display: block;

        border-radius: 12px;
    }

    #footer {
        margin-top: 12px;

        font-size: 12px;
        letter-spacing: 0.05em;

        opacity: 0.6;
    }
</style>
</head>

<body>

<div id="header">
    rlParticle web demo
</div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
    
    <script>
    var Module = {
        canvas: document.getElementById("canvas")
    };
    </script>
</div>

<div id="footer">
    Powered by Emscripten
</div>

<script async type="text/javascript" src="index.js"></script>

</body>
</html>
